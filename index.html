<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="initial-scale=1, maximum-scale=1, user-scalable=no" />
  <title>Map Viewer</title>
  <link rel="stylesheet" href="https://js.arcgis.com/4.29/esri/themes/light/main.css" />
  <script src="https://js.arcgis.com/4.29/"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet" />
  <style>
    /* ── Reset ── */
    * { box-sizing: border-box; margin: 0; padding: 0; }

    /* ── CSS Variables ── */
    :root {
      --panel-bg: #ffffff;
      --panel-border: #e8e8e8;
      --accent: #2563eb;
      --accent-light: #eff6ff;
      --text-primary: #111827;
      --text-secondary: #6b7280;
      --radius: 10px;
      --shadow: 0 4px 24px rgba(0,0,0,0.10);
    }

    /* ── Base ── */
    html, body {
      height: 100%;
      width: 100%;
      font-family: 'DM Sans', sans-serif;
      background: #f3f4f6;
    }

    /* ── Map container ── */
    #viewDiv {
      position: absolute;
      inset: 0;
    }

    /* ── Side Panel ── */
    #panel {
      position: absolute;
      top: 20px;
      right: 20px;
      direction: rtl;
      width: 270px;
      background: var(--panel-bg);
      border: 1px solid var(--panel-border);
      border-radius: var(--radius);
      box-shadow: var(--shadow);
      overflow: hidden;
      z-index: 10;
    }

    #panel-header {
      padding: 16px 18px 12px;
      border-bottom: 1px solid var(--panel-border);
    }

    #panel-header h1 {
      font-size: 13px;
      font-weight: 600;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--text-secondary);
      margin-bottom: 10px;
    }

    /* ── Minimize button ── */
    #minimize-btn {
      background: none;
      border: 1.5px solid var(--panel-border);
      border-radius: 5px;
      width: 26px;
      height: 26px;
      cursor: pointer;
      font-size: 14px;
      color: var(--text-secondary);
      display: flex;
      align-items: center;
      justify-content: center;
      line-height: 1;
      direction: ltr;
      flex-shrink: 0;
    }

    #minimize-btn:hover {
      border-color: var(--accent);
      color: var(--accent);
    }

    /* ── Category tabs ── */
    #category-tabs {
      display: flex;
      gap: 6px;
    }

    .cat-tab {
      flex: 1;
      padding: 7px 0;
      border: 1.5px solid var(--panel-border);
      border-radius: 6px;
      background: transparent;
      font-family: 'DM Sans', sans-serif;
      font-size: 12px;
      font-weight: 500;
      color: var(--text-secondary);
      cursor: pointer;
      transition: all 0.15s ease;
      text-align: center;
    }

    .cat-tab:hover {
      border-color: var(--accent);
      color: var(--accent);
      background: var(--accent-light);
    }

    .cat-tab.active {
      border-color: var(--accent);
      background: var(--accent);
      color: #fff;
    }

    /* ── Field list ── */
    #field-list {
      padding: 12px 14px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #field-list-label {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 4px;
      padding: 0 4px;
    }

    .field-btn {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 9px 12px;
      border: 1.5px solid var(--panel-border);
      border-radius: 7px;
      background: transparent;
      cursor: pointer;
      font-family: 'DM Sans', sans-serif;
      font-size: 13px;
      font-weight: 400;
      color: var(--text-primary);
      text-align: right;
      transition: all 0.15s ease;
    }

    .field-btn:hover {
      border-color: var(--accent);
      background: var(--accent-light);
      color: var(--accent);
    }

    .field-btn.active {
      border-color: var(--accent);
      background: var(--accent-light);
      color: var(--accent);
      font-weight: 500;
    }

    .field-dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: var(--accent);
      flex-shrink: 0;
      opacity: 0;
      transition: opacity 0.15s;
    }

    .field-btn.active .field-dot {
      opacity: 1;
    }

    /* ── Range Slider ── */
    #slider-box {
      margin: 0 14px 10px;
      padding: 10px 12px;
      background: #f9fafb;
      border: 1px solid var(--panel-border);
      border-radius: 7px;
    }

    #slider-box p {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 10px;
    }

    #slider-track {
      position: relative;
      height: 6px;
      background: #e5e7eb;
      border-radius: 3px;
      margin: 12px 8px;
    }

    #slider-range {
      position: absolute;
      height: 100%;
      background: var(--accent);
      border-radius: 3px;
      pointer-events: none;
    }

    .slider-handle {
      position: absolute;
      width: 16px;
      height: 16px;
      background: #fff;
      border: 2px solid var(--accent);
      border-radius: 50%;
      top: 50%;
      transform: translate(-50%, -50%);
      cursor: grab;
      z-index: 2;
      transition: box-shadow 0.15s;
    }

    .slider-handle:hover,
    .slider-handle:active {
      box-shadow: 0 0 0 4px var(--accent-light);
    }

    #slider-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--text-secondary);
      margin-top: 4px;
    }

    /* ── Legend ── */
    #legend-box {
      margin: 0 14px 14px;
      padding: 10px 12px;
      background: #f9fafb;
      border: 1px solid var(--panel-border);
      border-radius: 7px;
    }

    #legend-box p {
      font-size: 11px;
      font-weight: 500;
      color: var(--text-secondary);
      text-transform: uppercase;
      letter-spacing: 0.07em;
      margin-bottom: 8px;
    }

    #legend-gradient {
      display: flex;
      border-radius: 5px;
      overflow: hidden;
      height: 10px;
      margin-bottom: 5px;
    }

    #legend-labels {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      font-family: 'DM Mono', monospace;
      color: var(--text-secondary);
    }

    /* ── Hover Tooltip ── */
    #tooltip {
      position: absolute;
      background: #111827;
      color: #fff;
      padding: 6px 12px;
      border-radius: 6px;
      font-size: 12px;
      font-family: 'DM Mono', monospace;
      pointer-events: none;
      display: none;
      z-index: 99;
      white-space: nowrap;
      transform: translate(12px, -50%);
      box-shadow: 0 2px 12px rgba(0,0,0,0.2);
    }

    #tooltip::before {
      content: '';
      position: absolute;
      left: -5px;
      top: 50%;
      transform: translateY(-50%);
      border: 5px solid transparent;
      border-right-color: #111827;
      border-left: 0;
    }

    /* ── Loading Spinner ── */
    #loading {
      position: absolute;
      inset: 0;
      background: rgba(255,255,255,0.75);
      display: flex;
      align-items: center;
      justify-content: center;
      z-index: 50;
      font-size: 14px;
      color: var(--text-secondary);
      gap: 10px;
      transition: opacity 0.3s;
    }

    .spinner {
      width: 18px;
      height: 18px;
      border: 2px solid #e5e7eb;
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

<!-- Map -->
<div id="viewDiv"></div>

<!-- Hover tooltip -->
<div id="tooltip"></div>

<!-- Loading overlay -->
<div id="loading"><div class="spinner"></div> טוען מפה…</div>

<!-- Side Panel -->
<div id="panel">

  <!-- Header: title + minimize button -->
  <div id="panel-header">
    <div style="display:flex; justify-content:space-between; align-items:center; margin-bottom:10px;">
      <h1 style="margin-bottom:0">קטגוריות</h1>
      <button id="minimize-btn" title="Minimize">−</button>
    </div>
    <!-- Category tabs injected by JS -->
    <div id="category-tabs"></div>
  </div>

  <!-- Field buttons injected by JS -->
  <div id="field-list">
    <div id="field-list-label">שכבות</div>
  </div>

  <!-- Range slider filter -->
  <div id="slider-box">
    <p>סינון</p>
    <div id="slider-track">
      <div id="slider-range"></div>
      <div class="slider-handle" id="handle-min"></div>
      <div class="slider-handle" id="handle-max"></div>
    </div>
    <div id="slider-labels">
      <span id="slider-max-label">100%</span>
      <span id="slider-min-label">0%</span>
    </div>
  </div>

  <!-- Legend -->
  <div id="legend-box">
    <p>מקרא</p>
    <div id="legend-gradient">
      <div style="flex:1; background:rgb(8,48,107)"></div>
      <div style="flex:1; background:rgb(13,101,165)"></div>
      <div style="flex:1; background:rgb(49,130,189)"></div>
      <div style="flex:1; background:rgb(116,169,207)"></div>
      <div style="flex:1; background:rgb(239,243,255)"></div>
    </div>
    <div id="legend-labels">
      <span>100</span>
      <span>80</span>
      <span>60</span>
      <span>40</span>
      <span>20</span>
      <span>0</span>
    </div>
  </div>

</div><!-- end #panel -->

<script>
// ============================================================
//  CONFIGURATION — edit this section to match your data
// ============================================================
const LAYER_URL = "https://services2.arcgis.com/xMRYm7cNgdR5RN6F/arcgis/rest/services/Map2/FeatureServer/0";

const CATEGORIES = [
  {
    id: "education",
    label: "חינוך",
    fields: [
      { id: "female_bagrut_elig_percent",   label: "Field H1", alias: "Education Indicator 1" },
      { id: "female_bagrut_math_5_percent", label: "Field H2", alias: "Education Indicator 2" },
      { id: "female_bagrut_eng_5_percent",  label: "Field H3", alias: "Education Indicator 3" }
    ]
  },
  {
    id: "demography",
    label: "דמוגרפיה",
    fields: [
      { id: "female_self_empe_percent",  label: "Field D1", alias: "Demographic Indicator 1" },
      { id: "female_athletes_percent",   label: "Field D2", alias: "Demographic Indicator 2" },
      { id: "female_doctors_percent",    label: "Field D3", alias: "Demographic Indicator 3" }
    ]
  }
];

// 5 fixed class breaks — values are 0–1 decimals (e.g. 0.6 = 60%)
const CLASS_BREAKS = [
  { min: 0,   max: 0.199, color: [239, 243, 255], label: "0 – 19"   },
  { min: 0.2, max: 0.399, color: [116, 169, 207], label: "20 – 39"  },
  { min: 0.4, max: 0.599, color: [49,  130, 189], label: "40 – 59"  },
  { min: 0.6, max: 0.799, color: [13,  101, 165], label: "60 – 79"  },
  { min: 0.8, max: 1.0,   color: [8,   48,  107], label: "80 – 100" }
];
// ============================================================

require([
  "esri/Map",
  "esri/views/MapView",
  "esri/layers/FeatureLayer",
  "esri/renderers/ClassBreaksRenderer",
  "esri/symbols/SimpleFillSymbol"
], function (Map, MapView, FeatureLayer, ClassBreaksRenderer, SimpleFillSymbol) {

  // ── State ──
  let activeCategoryId = CATEGORIES[0].id;
  let activeFieldId    = CATEGORIES[0].fields[0].id;
  let highlight        = null;
  let layerView        = null;

  // ── Layer ──
  const layer = new FeatureLayer({
    url: LAYER_URL,
    outFields: ["*"],
    popupEnabled: true
  });

  const map = new Map({ basemap: "gray-vector", layers: [layer] });

  // ── Map View ──
  const view = new MapView({
    container: "viewDiv",
    map: map,
    zoom: 9,
    center: [34.8, 31.9],
    highlightOptions: {
      color: [255, 200, 0],
      fillOpacity: 0.35,
      haloColor: [255, 165, 0],
      haloOpacity: 1
    },
    ui: { components: ["zoom", "compass"] },
    padding: { right: 300 }
  });

  // ── DOM refs ──
  const tabsEl      = document.getElementById("category-tabs");
  const fieldEl     = document.getElementById("field-list");
  const tooltip     = document.getElementById("tooltip");
  const loadingEl   = document.getElementById("loading");
  const panel       = document.getElementById("panel");
  const minimizeBtn = document.getElementById("minimize-btn");

  // ── Minimize / expand panel ──
  let minimized = false;
  minimizeBtn.onclick = () => {
    minimized = !minimized;
    document.getElementById("field-list").style.display   = minimized ? "none" : "flex";
    document.getElementById("legend-box").style.display   = minimized ? "none" : "block";
    document.getElementById("slider-box").style.display   = minimized ? "none" : "block";
    document.getElementById("category-tabs").style.display = minimized ? "none" : "flex";
    minimizeBtn.textContent = minimized ? "+" : "−";
    panel.style.width = minimized ? "auto" : "270px";
    view.padding = { right: minimized ? 60 : 300 };
  };

  // ── Build category tabs ──
  function buildTabs() {
    tabsEl.innerHTML = "";
    CATEGORIES.forEach(cat => {
      const btn = document.createElement("button");
      btn.className = "cat-tab" + (cat.id === activeCategoryId ? " active" : "");
      btn.textContent = cat.label;
      btn.onclick = () => {
        activeCategoryId = cat.id;
        activeFieldId = cat.fields[0].id;
        buildTabs();
        buildFields();
        applyRenderer();
      };
      tabsEl.appendChild(btn);
    });
  }

  // ── Build field buttons ──
  function buildFields() {
    const label = document.getElementById("field-list-label");
    fieldEl.innerHTML = "";
    fieldEl.appendChild(label);

    const cat = CATEGORIES.find(c => c.id === activeCategoryId);
    cat.fields.forEach(f => {
      const btn = document.createElement("button");
      btn.className = "field-btn" + (f.id === activeFieldId ? " active" : "");
      btn.innerHTML = `<span class="field-dot"></span>${f.label}`;
      btn.onclick = () => {
        activeFieldId = f.id;
        buildFields();
        applyRenderer();
      };
      fieldEl.appendChild(btn);
    });
  }

  // ── Apply choropleth renderer + slider filter ──
  // Polygons inside the slider range get their normal color.
  // Polygons outside the range are grayed out.
  function applyRenderer() {
    const minVal = sliderMin / 100;  // convert display % back to 0–1 decimal
    const maxVal = sliderMax / 100;

    const breaks = CLASS_BREAKS.map(cb => ({
      minValue: cb.min,
      maxValue: cb.max,
      symbol: new SimpleFillSymbol({
        color: cb.max >= minVal && cb.min <= maxVal
          ? cb.color                  // inside range: normal color
          : [200, 200, 200, 0.3],     // outside range: grayed out
        outline: { color: [255, 255, 255, 0.4], width: 0.5 }
      }),
      label: cb.label
    }));

    layer.renderer = new ClassBreaksRenderer({
      field: activeFieldId,
      classBreakInfos: breaks
    });
  }

  // ── Range Slider ──
  let sliderMin = 0;    // display values 0–100
  let sliderMax = 100;

  const track     = document.getElementById("slider-track");
  const handleMin = document.getElementById("handle-min");
  const handleMax = document.getElementById("handle-max");
  const rangeEl   = document.getElementById("slider-range");
  const minLabel  = document.getElementById("slider-min-label");
  const maxLabel  = document.getElementById("slider-max-label");

  // Update slider visual position and labels
  function updateSliderUI() {
    handleMin.style.left = sliderMin + "%";
    handleMax.style.left = sliderMax + "%";
    rangeEl.style.left   = sliderMin + "%";
    rangeEl.style.right  = (100 - sliderMax) + "%";
    minLabel.textContent = sliderMin + "%";
    maxLabel.textContent = sliderMax + "%";
  }

  // Make a handle draggable — isMin=true for left handle, false for right
  function makeDraggable(handle, isMin) {
    handle.addEventListener("pointerdown", e => {
      e.preventDefault();
      const trackRect = track.getBoundingClientRect();

      const onMove = e => {
        const pct = Math.round(
          Math.max(0, Math.min(100,
            ((e.clientX - trackRect.left) / trackRect.width) * 100
          ))
        );
        if (isMin) {
          sliderMin = Math.min(pct, sliderMax - 1);
        } else {
          sliderMax = Math.max(pct, sliderMin + 1);
        }
        updateSliderUI();
        applyRenderer();
      };

      const onUp = () => {
        window.removeEventListener("pointermove", onMove);
        window.removeEventListener("pointerup", onUp);
      };

      window.addEventListener("pointermove", onMove);
      window.addEventListener("pointerup", onUp);
    });
  }

  makeDraggable(handleMin, true);
  makeDraggable(handleMax, false);
  updateSliderUI();

  // ── Hover highlight ──
  view.whenLayerView(layer).then(lv => {
    layerView = lv;

    view.on("pointer-move", event => {
      view.hitTest(event).then(response => {
        if (highlight) { highlight.remove(); highlight = null; }

        const result = response.results.find(r => r.graphic?.layer === layer);

        if (result) {
          highlight = layerView.highlight(result.graphic);

          const val      = result.graphic.attributes[activeFieldId];
          const cat      = CATEGORIES.find(c => c.id === activeCategoryId);
          const fieldDef = cat.fields.find(f => f.id === activeFieldId);
          tooltip.textContent = `${fieldDef.label}: ${val != null ? (val * 100).toFixed(1) + "%" : "N/A"}`;
          tooltip.style.display = "block";
          tooltip.style.left    = event.x + "px";
          tooltip.style.top     = event.y + "px";
        } else {
          tooltip.style.display = "none";
        }
      });
    });

    view.on("pointer-leave", () => {
      if (highlight) { highlight.remove(); highlight = null; }
      tooltip.style.display = "none";
    });
  });

  // ── Init ──
  view.when(() => {
    loadingEl.style.opacity = "0";
    setTimeout(() => loadingEl.style.display = "none", 300);
    buildTabs();
    buildFields();
    applyRenderer();
  });

});
</script>
</body>
</html>
